    <script>
      // Companion to public/404.html — decodes a path that was redirected
      // through the GitHub Pages SPA fallback back into a real URL via
      // history.replaceState, before React Router ever mounts. A no-op on
      // every other host (Netlify, Vercel, or a normal direct visit).
      (function (loc) {
        if (loc.search[1] === '/') {
          var decoded = loc.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, '', loc.pathname.slice(0, -1) + decoded + loc.hash);
        }
      })(window.location);
    </script>
    <script>
      // Applied synchronously (no `defer`/`type=module`) so the correct
      // theme class is present before first paint — prevents a flash of
      // the wrong theme on load.
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          /* localStorage unavailable — default to light theme */
        }
      })();
    </script>
